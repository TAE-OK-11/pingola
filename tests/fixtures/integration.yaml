server:
  http_listen:
    - "127.0.0.1:18080"
  https_listen:
    - "127.0.0.1:18443"
  certificate: /tmp/pingora-integration/cert.pem
  private_key: /tmp/pingora-integration/key.pem
  threads: 1
  upstream_keepalive_pool_size: 16
  max_retries: 1
  graceful_shutdown_timeout_seconds: 2
  static_cache_bytes: 4194304
  access_log: true
  health_socket: /tmp/pingora-integration/health.sock

trusted_proxies:
  - "127.0.0.0/8"
  - "10.0.0.0/8"

upstreams:
  backend:
    address: "127.0.0.1:19090"

hosts:
  static:
    domains:
      - static.test
    handler: static
    static_root: /tmp/pingora-integration/www
  app:
    domains:
      - app.test
    handler: navidrome-main
    upstream: backend
    redirect_http: true
    max_body_bytes: 16
  vault:
    domains:
      - vault.test
    handler: vaultwarden
    upstream: backend
    redirect_http: true
