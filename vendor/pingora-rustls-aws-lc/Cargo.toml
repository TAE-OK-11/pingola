[package]
name = "pingora-rustls"
version = "0.8.1"
license = "Apache-2.0"
edition = "2021"
repository = "https://github.com/cloudflare/pingora"
categories = ["asynchronous", "network-programming"]
keywords = ["async", "tls", "ssl", "pingora"]
description = "Pingora rustls integration patched to use AWS-LC exclusively"

[lib]
name = "pingora_rustls"
path = "src/lib.rs"

[dependencies]
aws-lc-rs = "1.17"
log = "0.4.21"
no_debug = "3.1.0"
pingora-error = "0.8.1"
rustls = { version = "0.23.37", default-features = false, features = ["aws_lc_rs", "logging", "prefer-post-quantum", "std", "tls12"] }
rustls-native-certs = "0.7.1"
rustls-pemfile = "2.1.2"
rustls-pki-types = "1.7.0"
tokio-rustls = { version = "0.26.0", default-features = false, features = ["aws_lc_rs", "logging", "tls12"] }


