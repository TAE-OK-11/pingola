name: verify-and-publish

concurrency:
  group: pingora-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      publish_images:
        description: Publish GHCR images from Actions (normally disabled; final native image is built on the benchmark host)
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - name: RustSec dependency audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install build and test tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake ninja-build jq nghttp2-client
          rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
          rustup show active-toolchain
      - name: PGO trainer preflight
        run: |
          bash -n bench/pgo_train.sh
          bash -n bench/pgo_compare_three.sh
          rustc --edition=2021 -D warnings bench/backend.rs -o /tmp/pgo-backend
          rustc --edition=2021 -D warnings bench/pgo_client.rs -o /tmp/pgo-client
          /tmp/pgo-client \
            --port 19080 \
            --threads 0 \
            --requests-per-thread 1 \
            --requests-per-connection 500 \
            2>/tmp/pgo-client-validation.log && exit 1 || true
          grep -q 'threads must be 1..=64' /tmp/pgo-client-validation.log
      - name: Format
        run: cargo fmt --check
      - name: AWS-LC-only TLS dependency graph
        run: |
          cargo tree --locked > /tmp/cargo-tree.txt
          grep -q 'aws-lc-rs v' /tmp/cargo-tree.txt
          grep -q 'rustls v' /tmp/cargo-tree.txt
          if grep -Eiq '(^|[[:space:]])(boring|boring-sys|pingora-boringssl) v' /tmp/cargo-tree.txt; then
            echo 'BoringSSL unexpectedly appears in the selected dependency graph' >&2
            exit 1
          fi
      - name: Unit tests
        run: cargo test --all-targets --locked
      - name: Build integration-test binary
        run: cargo build --locked
      - name: Lints
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: System allocator baseline still builds
        run: cargo check --all-targets --locked --no-default-features --features system-allocator,tls-aws-lc
      - name: Jemalloc rollback build still compiles
        run: cargo check --all-targets --locked --no-default-features --features jemalloc,tls-aws-lc
      - name: Protocol and security integration checks
        run: |
          # This test intentionally creates a root-owned mode-0600 private key
          # and then checks it as UID/GID 10001. Limit elevation to that test.
          sudo tests/runtime_preflight.sh
          tests/listeners_health.sh
          tests/retries.sh
          tests/limit_isolation.sh
          tests/static_global_limit.sh
          tests/service_matrix.sh
          tests/integration.sh
      - name: HTTP/2 correctness matrix
        run: tests/http2_matrix.sh

  image-test:
    needs: [audit, verify]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_cpu: x86-64-v2
            lto: fat
            runtime: true
          - target_cpu: znver1
            lto: fat
            runtime: false
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: pingora:ci-${{ matrix.target_cpu }}-${{ matrix.lto }}
          pull: true
          build-args: |
            ALLOCATOR=tcmalloc
            TLS_PROVIDER=aws-lc
            RUST_TARGET_CPU=${{ matrix.target_cpu }}
            RUST_LTO=${{ matrix.lto }}
            BUILD_VERSION=ci
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Non-root and read-only runtime checks
        if: matrix.runtime
        env:
          PINGORA_TEST_IMAGE: pingora:ci-${{ matrix.target_cpu }}-${{ matrix.lto }}
          PINGORA_EXPECTED_TARGET_CPU: ${{ matrix.target_cpu }}
          PINGORA_EXPECTED_LTO: ${{ matrix.lto }}
          PINGORA_EXPECTED_TLS_PROVIDER: aws-lc
        run: tests/docker_runtime.sh
      - name: Specialized image metadata check
        if: ${{ !matrix.runtime }}
        env:
          IMAGE: pingora:ci-${{ matrix.target_cpu }}-${{ matrix.lto }}
        run: |
          # GitHub-hosted runner CPU models are not stable. Running the full
          # znver1 listener on an incompatible host can correctly SIGILL even
          # though the image was built for a compatible Oracle/AMD Zen host.
          test "$(docker image inspect --format '{{.Config.User}}' "${IMAGE}")" = "10001:10001"
          target_cpu=$(docker image inspect "${IMAGE}" | jq -r '.[0].Config.Labels["org.opencontainers.image.rust.target-cpu"]')
          allocator=$(docker image inspect "${IMAGE}" | jq -r '.[0].Config.Labels["org.opencontainers.image.allocator"]')
          test "${target_cpu}" = "znver1"
          test "${allocator}" = "tcmalloc"
          test "$(docker image inspect "${IMAGE}" | jq -r '.[0].Config.Labels["org.opencontainers.image.rust.lto"]')" = "fat"

  image:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_images
    needs: image-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Publish the deprecated name from the same build for one migration
          # release so both tags resolve to identical manifests.
          images: |
            ghcr.io/tae-ok-11/pingora
            ghcr.io/tae-ok-11/pingola
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          # OCI source/url must resolve to the repository that produced the
          # image. Change both to /pingora atomically when the GitHub repository
          # itself is renamed; the product and image names are already Pingora.
          labels: |
            org.opencontainers.image.title=Pingora
            org.opencontainers.image.description=High-performance AWS-LC JBS Pingora reverse proxy
            org.opencontainers.image.source=https://github.com/TAE-OK-11/pingola
            org.opencontainers.image.url=https://github.com/TAE-OK-11/pingola
            org.opencontainers.image.allocator=tcmalloc
            org.opencontainers.image.tls.provider=aws-lc
      - name: Build and publish
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALLOCATOR=tcmalloc
            TLS_PROVIDER=aws-lc
            RUST_TARGET_CPU=x86-64-v2
            RUST_LTO=fat
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Verify the exact published generic image
        env:
          PINGORA_TEST_IMAGE: ghcr.io/tae-ok-11/pingora@${{ steps.build.outputs.digest }}
          PINGORA_EXPECTED_TARGET_CPU: x86-64-v2
          PINGORA_EXPECTED_LTO: fat
          PINGORA_EXPECTED_TLS_PROVIDER: aws-lc
        run: tests/docker_runtime.sh

  image-znver1:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_images
    needs: image-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Oracle image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/tae-ok-11/pingora
          tags: |
            type=raw,value=oracle-znver1
            type=raw,value=pgo-znver1
            type=sha,prefix=sha-,suffix=-znver1
          labels: |
            org.opencontainers.image.title=Pingora
            org.opencontainers.image.description=Trained PGO AWS-LC JBS Pingora reverse proxy for AMD Zen 1 or newer
            org.opencontainers.image.source=https://github.com/TAE-OK-11/pingola
            org.opencontainers.image.url=https://github.com/TAE-OK-11/pingola
            org.opencontainers.image.allocator=tcmalloc
            org.opencontainers.image.tls.provider=aws-lc
            org.opencontainers.image.rust.target-cpu=znver1
            org.opencontainers.image.rust.pgo=train
            org.opencontainers.image.rust.pgo-train-target-cpu=x86-64-v2
      - name: Build and publish trained PGO Oracle image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALLOCATOR=tcmalloc
            TLS_PROVIDER=aws-lc
            PGO_MODE=train
            PGO_TRAIN_TARGET_CPU=x86-64-v2
            RUST_TARGET_CPU=znver1
            RUST_LTO=fat
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
