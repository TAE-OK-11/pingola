name: verify-and-publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build and test tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake ninja-build jq nghttp2-client
          rustup toolchain install 1.96.0 --profile minimal --component clippy,rustfmt
      - name: Format
        run: cargo fmt --check
      - name: Unit tests
        run: cargo test --all-targets --locked
      - name: Lints
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Protocol and security integration checks
        run: |
          tests/runtime_preflight.sh
          tests/listeners_health.sh
          tests/retries.sh
          tests/limit_isolation.sh
          tests/service_matrix.sh
          tests/integration.sh
      - name: HTTP/2 correctness matrix
        run: tests/http2_matrix.sh

  image:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Publish the deprecated name from the same build for one migration
          # release so both tags resolve to identical manifests.
          images: |
            ghcr.io/tae-ok-11/pingora
            ghcr.io/tae-ok-11/pingola
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUST_TARGET_CPU=x86-64-v2
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
