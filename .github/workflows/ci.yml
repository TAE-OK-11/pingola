name: verify-and-publish

concurrency:
  group: pingora-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - name: RustSec dependency audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install build and test tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake ninja-build jq nghttp2-client
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
      - name: Format
        run: cargo fmt --check
      - name: Unit tests
        run: cargo test --all-targets --locked
      - name: Build integration-test binary
        run: cargo build --locked
      - name: Lints
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: System allocator baseline still builds
        run: cargo check --all-targets --locked --no-default-features --features system-allocator
      - name: Jemalloc rollback build still compiles
        run: cargo check --all-targets --locked --no-default-features --features jemalloc
      - name: Protocol and security integration checks
        run: |
          # This test intentionally creates a root-owned mode-0600 private key
          # and then checks it as UID/GID 10001. Limit elevation to that test.
          sudo tests/runtime_preflight.sh
          tests/listeners_health.sh
          tests/retries.sh
          tests/limit_isolation.sh
          tests/service_matrix.sh
          tests/integration.sh
      - name: HTTP/2 correctness matrix
        run: tests/http2_matrix.sh

  image-test:
    needs: [audit, verify]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target_cpu: [x86-64-v2, znver1]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: pingora:ci-${{ matrix.target_cpu }}
          build-args: |
            ALLOCATOR=tcmalloc
            RUST_TARGET_CPU=${{ matrix.target_cpu }}
            BUILD_VERSION=ci
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Non-root and read-only runtime checks
        if: matrix.target_cpu == 'x86-64-v2'
        env:
          PINGORA_TEST_IMAGE: pingora:ci-${{ matrix.target_cpu }}
          PINGORA_EXPECTED_TARGET_CPU: ${{ matrix.target_cpu }}
        run: tests/docker_runtime.sh
      - name: Specialized image metadata and allocator smoke check
        if: matrix.target_cpu == 'znver1'
        env:
          IMAGE: pingora:ci-${{ matrix.target_cpu }}
        run: |
          # GitHub-hosted runner CPU models are not stable. Running the full
          # znver1 listener on an incompatible host can correctly SIGILL even
          # though the image was built for a compatible Oracle/AMD Zen host.
          test "$(docker image inspect --format '{{.Config.User}}' "${IMAGE}")" = "10001:10001"
          target_cpu=$(docker image inspect "${IMAGE}" | jq -r '.[0].Config.Labels["org.opencontainers.image.rust.target-cpu"]')
          allocator=$(docker image inspect "${IMAGE}" | jq -r '.[0].Config.Labels["org.opencontainers.image.allocator"]')
          test "${target_cpu}" = "znver1"
          test "${allocator}" = "tcmalloc"
          docker run --rm "${IMAGE}" --allocator-info | grep -q '^allocator=tcmalloc '

  image:
    if: github.event_name != 'pull_request'
    needs: image-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Publish the deprecated name from the same build for one migration
          # release so both tags resolve to identical manifests.
          images: |
            ghcr.io/tae-ok-11/pingora
            ghcr.io/tae-ok-11/pingola
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          # metadata-action derives these from the current repository name by
          # default. Pin the post-migration identity before the GitHub repo is
          # renamed so it cannot overwrite the Dockerfile's Pingora labels.
          labels: |
            org.opencontainers.image.title=Pingora
            org.opencontainers.image.description=High-performance AWS-LC JBS Pingora reverse proxy
            org.opencontainers.image.source=https://github.com/TAE-OK-11/pingora
            org.opencontainers.image.url=https://github.com/TAE-OK-11/pingora
            org.opencontainers.image.allocator=tcmalloc
      - name: Build and publish
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALLOCATOR=tcmalloc
            RUST_TARGET_CPU=x86-64-v2
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  image-znver1:
    if: github.event_name == 'push'
    needs: image-test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Oracle image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/tae-ok-11/pingora
          tags: |
            type=raw,value=oracle-znver1
            type=sha,prefix=sha-,suffix=-znver1
          labels: |
            org.opencontainers.image.title=Pingora
            org.opencontainers.image.description=High-performance AWS-LC JBS Pingora reverse proxy for AMD Zen 1 or newer
            org.opencontainers.image.source=https://github.com/TAE-OK-11/pingora
            org.opencontainers.image.url=https://github.com/TAE-OK-11/pingora
            org.opencontainers.image.allocator=tcmalloc
            org.opencontainers.image.rust.target-cpu=znver1
      - name: Build and publish Oracle image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALLOCATOR=tcmalloc
            RUST_TARGET_CPU=znver1
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
