services:
  pingora:
    container_name: pingora
    image: ${PINGORA_IMAGE:-ghcr.io/tae-ok-11/pingora:latest}
    build:
      context: .
      args:
        RUST_TARGET_CPU: x86-64-v2
    network_mode: host
    restart: unless-stopped
    stop_grace_period: 65s
    pids_limit: 256
    read_only: true
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp/pingora:size=16m,mode=0700,uid=10001,gid=10001
    environment:
      PINGORA_CONFIG: /etc/pingora/pingora.yaml
    volumes:
      - ${PINGORA_CONFIG_FILE:-./config/pingora.yaml}:/etc/pingora/pingora.yaml:ro
      - ${PINGORA_CERT_ROOT:-/etc/letsencrypt}:/etc/pingora/cert:ro
      - /var/www/pikky:/var/www/pikky:ro
